<!DOCTYPE html>
<html lang="{{ site.Language }}" dir="auto" data-theme="auto">
<head>
  {{- partial "head.html" . }}
</head>
{{- if or (ne .Kind "page") (eq .Layout "archives") }}
<body class="list" id="top">
{{- else }}
<body id="top">
{{- end }}
  {{ partial "header.html" . -}}
  <main class="main">
    {{- block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . -}}
</body>
</html>
